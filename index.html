<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeCata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AnimeCata</h1>
        <p>O melhor catálogo de animes do Brasil</p>

        <input type="text" placeholder="Pesquisar anime...">
    </header>

    <main>

        <section class="catalogo">
            <div class="anime-card">
                <img src="https://myanimelist.net/images/anime/1244/138851.jpg" alt="One Piece">

                <h3>One Piece</h3>
                <a href="https://myanimelist.net/anime/21/One_Piece"
                   target="_blank">
                    Ver sinopse
                </a>
            </div>

            <div class="anime-card">
                <img src="https://myanimelist.net/images/anime/1141/142503.jpg" alt="Naruto">

                <h3>Naruto</h3>
                <a href="https://myanimelist.net/anime/20/Naruto"
                   target="_blank">
                    Ver sinopse
                </a>
            </div>

            <div class="anime-card">
                <img src="https://myanimelist.net/images/anime/1277/142022.jpg" alt="Dragon Ball">

                <h3>Dragon Ball</h3>
                <a href="https://myanimelist.net/anime/813/Dragon_Ball_Z"
                   target="_blank">
                    Ver sinopse
                </a>
            </div>

            <div class="anime-card">
                <img src="https://myanimelist.net/images/anime/1787/140239.jpg" alt="Pokemon">

                <h3>Pokemon</h3>
                <a href="https://myanimelist.net/anime/527/Pokemon?q=pokemon&cat=anime"
                   target="_blank">
                    Ver sinopse
                </a>
            </div>

            <div class="anime-card">
                <img src="https://myanimelist.net/images/anime/12/76049.jpg" alt="One Punch Man">

                <h3>One Punch Man</h3>
                <a href="https://myanimelist.net/anime/30276/One_Punch_Man"
                   target="_blank">
                    Ver sinopse
                </a>
            </div>

            <div class="anime-card">
                <img src="https://myanimelist.net/images/anime/1079/138100.jpg" alt="Death Note">

                <h3>Death Note</h3>
                <a href="https://myanimelist.net/anime/1535/Death_Note?q=deat&cat=anime"
                   target="_blank">
                    Ver sinopse
                </a>
            </div>

            <div class="anime-card">
                <img src="https://myanimelist.net/images/anime/1171/109222.jpg" alt="Jujutsu Kaisen">

                <h3>Jujutsu Kaisen</h3>
                <a href="https://myanimelist.net/anime/40748/Jujutsu_Kaisen?q=juju&cat=anime"
                   target="_blank">
                    Ver sinopse
                </a>
            </div>
        </section>

    </main>

</body>
</html>
